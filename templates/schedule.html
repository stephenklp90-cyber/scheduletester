<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Schedule Manager</title>
  <link rel="stylesheet" href="/static/styles.css">
</head>
<body>
  <header class="topbar">
    <div>
      <h1>Schedule Manager</h1>
      <p class="subtitle">Live scheduling across all locations</p>
    </div>
    <div class="session-panel" id="sessionPanel">
      <button type="button" id="managerToggle" class="manager-toggle">Manager</button>
      <div id="managerPopover" class="manager-popover hidden">
        <div id="viewerBadge" class="badge">View Only</div>
        <form id="loginForm" class="login-form">
          <input type="text" id="username" placeholder="Manager username" required>
          <input type="password" id="password" placeholder="Password" required>
          <button type="submit">Log in</button>
        </form>
        <div id="managerControls" class="manager-controls hidden">
          <span class="badge manager">Manager Mode</span>
          <button type="button" id="logoutButton">Log out</button>
        </div>
      </div>
    </div>
  </header>

  <main>
    <section class="controls">
      <div class="location-tabs" id="locationTabs"></div>
      <div class="month-controls">
        <button type="button" id="prevMonth">Previous</button>
        <h2 id="monthLabel"></h2>
        <button type="button" id="nextMonth">Next</button>
      </div>
    </section>

    <section class="publish-panel" id="publishPanel">
      <button type="button" id="getPublishLink" class="hidden">Get Public Link</button>
      <button type="button" id="rotatePublishLink" class="hidden">Rotate Link</button>
      <button type="button" id="savePresetButton" class="hidden">Save 8-Week Preset</button>
      <button type="button" id="applyPresetButton" class="hidden">Apply Preset</button>
      <button type="button" id="applyNext8Button" class="hidden">Apply Next 8 Weeks</button>
      <button type="button" id="copyMonthButton">Copy Month</button>
      <select id="presetSelect" class="hidden"></select>
      <input id="publishLinkField" type="text" readonly class="hidden" />
      <span id="saveStatus" class="save-status"></span>
    </section>

    <section class="calendar-wrap">
      <table class="calendar-table" id="calendarTable">
        <thead>
          <tr id="weekdayHeader"></tr>
        </thead>
        <tbody id="calendarBody"></tbody>
      </table>
    </section>
  </main>

  <script>
    window.APP_CONFIG = {{ app_config | tojson }};
  </script>
  <script src="/static/app.js"></script>
</body>
</html>
