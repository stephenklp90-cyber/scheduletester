<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Schedule Manager</title>
  <link rel="stylesheet" href="/static/styles.css">
</head>
<body>
  <header class="topbar">
    <div>
      <h1>Schedule Manager</h1>
      <p class="subtitle">Live scheduling across all locations</p>
    </div>
    <div class="session-panel" id="sessionPanel">
      <span id="viewerBadge" class="badge">Employee View</span>
      <span id="managerBadge" class="badge manager hidden">Manager Mode</span>
      <button type="button" id="adminToggleButton" class="hidden">Admin Controls</button>
      <button type="button" id="logoutButton">Log out</button>
    </div>
  </header>

  <main>
    <section class="controls">
      <div class="location-tabs" id="locationTabs"></div>
      <div class="month-controls">
        <button type="button" id="prevWindow">Previous 8 Weeks</button>
        <h2 id="windowLabel"></h2>
        <button type="button" id="nextWindow">Next 8 Weeks</button>
      </div>
    </section>

    <section class="publish-panel" id="publishPanel">
      <button type="button" id="getPublishLink" class="hidden">Get Public Link</button>
      <button type="button" id="rotatePublishLink" class="hidden">Rotate Link</button>
      <button type="button" id="savePresetButton" class="hidden">Save 8-Week Preset</button>
      <button type="button" id="applyPresetButton" class="hidden">Apply Preset</button>
      <button type="button" id="applyNext8Button" class="hidden">Apply Next 8 Weeks</button>
      <button type="button" id="undoButton" class="hidden">Undo Last Change</button>
      <button type="button" id="clearMonthButton" class="hidden danger-button">Clear Month</button>
      <button type="button" id="copyMonthButton">Copy 8 Weeks</button>
      <select id="presetSelect" class="hidden"></select>
      <input id="publishLinkField" type="text" readonly class="hidden" />
      <span id="saveStatus" class="save-status"></span>
    </section>

    <section id="adminPanel" class="admin-panel hidden">
      <h3>Employee Access</h3>
      <form id="employeeCredsForm" class="employee-creds-form">
        <input type="text" id="employeeUsername" placeholder="Employee username (e.g. YFM)" required>
        <input type="password" id="employeePassword" placeholder="New employee password (optional)">
        <button type="submit">Save Employee Login</button>
      </form>
      <p class="subtitle">Leave password blank to keep the existing employee password.</p>
    </section>

    <section class="calendar-wrap">
      <table class="calendar-table" id="calendarTable">
        <thead>
          <tr id="weekdayHeader"></tr>
        </thead>
        <tbody id="calendarBody"></tbody>
      </table>
    </section>
  </main>

  <script>
    window.APP_CONFIG = {{ app_config | tojson }};
  </script>
  <script src="/static/app.js"></script>
</body>
</html>
