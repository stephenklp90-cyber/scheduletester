<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Schedule Login</title>
  <link rel="stylesheet" href="/static/styles.css">
</head>
<body>
  <main class="login-page">
    <section class="login-card">
      <h1>Schedule Portal</h1>
      <p>Sign in as manager or employee.</p>
      <form id="portalLoginForm" class="login-form login-portal-form">
        <input type="text" id="portalUsername" placeholder="Username" required>
        <input type="password" id="portalPassword" placeholder="Password" required>
        <button type="submit">Sign In</button>
      </form>
      <p id="portalStatus" class="save-status"></p>
    </section>
  </main>

  <script>
    const form = document.getElementById("portalLoginForm");
    const status = document.getElementById("portalStatus");

    form.addEventListener("submit", async (evt) => {
      evt.preventDefault();
      status.textContent = "Signing in...";
      status.classList.remove("error");

      const payload = {
        username: document.getElementById("portalUsername").value.trim(),
        password: document.getElementById("portalPassword").value,
      };

      try {
        const response = await fetch("/login", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(payload),
        });
        const data = await response.json();
        if (!response.ok) {
          throw new Error(data.error || "Login failed");
        }
        window.location.href = "/schedule";
      } catch (err) {
        status.textContent = err.message;
        status.classList.add("error");
      }
    });
  </script>
</body>
</html>
